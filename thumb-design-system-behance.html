<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zero to Design System — Behance Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1400px;height:933px;overflow:hidden;background:#0A0A0C;font-family:'Outfit',sans-serif;color:#D4D4D8;position:relative}
body::after{content:'';position:fixed;inset:0;border:1px solid rgba(224,64,160,0.14);pointer-events:none;z-index:1000}
.bg-glow{position:absolute;width:900px;height:900px;border-radius:50%;background:radial-gradient(ellipse,rgba(224,64,160,0.10) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.ghost{position:absolute;font-family:'Space Mono',monospace;font-size:520px;font-weight:700;color:#E040A0;opacity:0.025;top:-60px;right:-40px;line-height:1;pointer-events:none;user-select:none}
.ov-top{position:absolute;top:0;left:0;right:0;height:240px;background:linear-gradient(to bottom,rgba(10,10,12,0.88) 0%,transparent 100%);z-index:10;pointer-events:none}
.ov-bot{position:absolute;bottom:0;left:0;right:0;height:380px;background:linear-gradient(to top,rgba(10,10,12,0.97) 0%,rgba(10,10,12,0.5) 60%,transparent 100%);z-index:10;pointer-events:none}
.brand{position:absolute;top:44px;left:52px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#E040A0;z-index:20;letter-spacing:.04em}
.brand span{color:#2A2A38;font-weight:400}
.counter{position:absolute;top:44px;right:52px;font-family:'Space Mono',monospace;font-size:10px;color:#2A2A38;letter-spacing:2px;text-transform:uppercase;z-index:20}
.bottom{position:absolute;bottom:52px;left:52px;right:52px;display:flex;justify-content:space-between;align-items:flex-end;z-index:20}
.num{font-family:'Space Mono',monospace;font-size:11px;color:#E040A0;letter-spacing:3px;margin-bottom:16px}
.title{font-size:88px;font-weight:800;color:#F0F0F4;line-height:.92;letter-spacing:-3px}
.tags{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.tag{font-family:'Space Mono',monospace;font-size:9px;color:#4A4A58;letter-spacing:1.5px;text-transform:uppercase;padding:7px 14px;border:1px solid rgba(255,255,255,0.05);border-radius:4px}

/* Visual */
.visual{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5}
.token-diagram{width:820px;display:flex;flex-direction:column;align-items:center;gap:0}

/* Row label */
.row-wrap{display:flex;flex-direction:column;align-items:center;gap:0;width:100%}
.row-lbl{font-family:'Space Mono',monospace;font-size:9px;color:#2A2A38;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;align-self:flex-start;margin-left:4px}

/* Connectors SVG */
.connectors{display:block;margin:0 auto}

/* Primitives row */
.prim-row{display:flex;gap:16px;align-items:center;justify-content:center}
.prim-dot{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.prim-dot::after{content:attr(data-lbl);position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:8px;color:#3A3A48;white-space:nowrap;letter-spacing:.5px}

/* Semantic row */
.sem-row{display:flex;gap:12px;justify-content:center}
.sem-pill{font-family:'Space Mono',monospace;font-size:10px;padding:8px 16px;border-radius:6px;border:1px solid;white-space:nowrap}
.sem-pill.hi{background:rgba(224,64,160,0.12);border-color:rgba(224,64,160,0.35);color:#E040A0}
.sem-pill.dim{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.07);color:#4A4A58}

/* Component row */
.comp-row{display:flex;gap:16px;justify-content:center;align-items:center}
.comp-btn{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:10px 28px;border-radius:8px;background:#E040A0;color:#0A0A0C;white-space:nowrap}
.comp-badge{font-family:'Space Mono',monospace;font-size:9px;padding:5px 14px;border-radius:20px;background:rgba(224,64,160,0.12);border:1px solid rgba(224,64,160,0.3);color:#E040A0;letter-spacing:1px;text-transform:uppercase}
.comp-input{font-family:'Space Mono',monospace;font-size:10px;padding:8px 20px;border-radius:7px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#6B6B78;width:180px}
.comp-card{font-family:'Space Mono',monospace;font-size:9px;padding:10px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:#4A4A58;display:flex;flex-direction:column;gap:6px}
.comp-card-inner{height:7px;border-radius:2px;background:rgba(255,255,255,0.06)}
.comp-card-inner.a{width:80%;background:rgba(224,64,160,0.15)}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="ghost">02</div>
<div class="ov-top"></div>
<div class="ov-bot"></div>
<div class="brand">VM_<span>studio</span></div>
<div class="counter">Case Study · 02 / 03</div>

<div class="visual">
  <div class="token-diagram">

    <!-- ROW 1: Primitives -->
    <div class="row-wrap">
      <div class="row-lbl">// PRIMITIVES</div>
      <div class="prim-row">
        <div class="prim-dot" data-lbl="brand-red" style="background:rgba(255,64,96,0.15);border:1.5px solid rgba(255,64,96,0.4)">
          <svg width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#FF4060"/></svg>
        </div>
        <div class="prim-dot" data-lbl="brand-pink" style="background:rgba(224,64,160,0.15);border:1.5px solid rgba(224,64,160,0.4)">
          <svg width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#E040A0"/></svg>
        </div>
        <div class="prim-dot" data-lbl="brand-green" style="background:rgba(32,224,112,0.1);border:1.5px solid rgba(32,224,112,0.3)">
          <svg width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#20E070"/></svg>
        </div>
        <div class="prim-dot" data-lbl="brand-yellow" style="background:rgba(224,208,96,0.1);border:1.5px solid rgba(224,208,96,0.3)">
          <svg width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#E0D060"/></svg>
        </div>
        <div class="prim-dot" data-lbl="neutral-900" style="background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08)">
          <svg width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#2A2A38"/></svg>
        </div>
        <div class="prim-dot" data-lbl="neutral-100" style="background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1)">
          <svg width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#F0F0F4"/></svg>
        </div>
      </div>
    </div>

    <!-- Connector 1 -->
    <svg class="connectors" width="820" height="60" viewBox="0 0 820 60">
      <line x1="100" y1="0" x2="190" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <line x1="256" y1="0" x2="340" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <line x1="410" y1="0" x2="410" y2="60" stroke="rgba(224,64,160,0.2)" stroke-width="1.5"/>
      <line x1="564" y1="0" x2="490" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <line x1="718" y1="0" x2="630" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </svg>

    <!-- ROW 2: Semantic -->
    <div class="row-wrap" style="margin-bottom:0">
      <div class="row-lbl">// SEMANTIC TOKENS</div>
      <div class="sem-row">
        <div class="sem-pill dim">bg-surface</div>
        <div class="sem-pill dim">text-default</div>
        <div class="sem-pill hi">cta-primary</div>
        <div class="sem-pill hi">cta-hover</div>
        <div class="sem-pill dim">border-card</div>
        <div class="sem-pill dim">shadow-lg</div>
      </div>
    </div>

    <!-- Connector 2 -->
    <svg class="connectors" width="820" height="60" viewBox="0 0 820 60">
      <line x1="190" y1="0" x2="120" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <line x1="340" y1="0" x2="340" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <line x1="435" y1="0" x2="490" y2="60" stroke="rgba(224,64,160,0.22)" stroke-width="1.5"/>
      <line x1="490" y1="0" x2="560" y2="60" stroke="rgba(224,64,160,0.15)" stroke-width="1"/>
      <line x1="630" y1="0" x2="700" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </svg>

    <!-- ROW 3: Components -->
    <div class="row-wrap">
      <div class="row-lbl">// COMPONENTS</div>
      <div class="comp-row">
        <div class="comp-btn">Pay Now</div>
        <div class="comp-badge">Confirmed</div>
        <div class="comp-input">0.0024 BTC</div>
        <div class="comp-card" style="width:120px">
          <div class="comp-card-inner a"></div>
          <div class="comp-card-inner" style="width:60%"></div>
          <div class="comp-card-inner" style="width:40%"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="bottom">
  <div>
    <div class="num">// 02</div>
    <div class="title">Zero to<br>Design System</div>
  </div>
  <div class="tags">
    <div class="tag">Design System</div>
    <div class="tag">Crypto · E-Commerce</div>
    <div class="tag">Token Architecture</div>
  </div>
</div>
</body>
</html>
