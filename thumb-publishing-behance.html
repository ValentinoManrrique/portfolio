<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Publishing at Scale — Behance Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1400px;height:933px;overflow:hidden;background:#0A0A0C;font-family:'Outfit',sans-serif;color:#D4D4D8;position:relative}

/* Accent border */
body::after{content:'';position:fixed;inset:0;border:1px solid rgba(32,224,112,0.14);pointer-events:none;z-index:1000}

/* BG radial glow */
.bg-glow{position:absolute;width:900px;height:900px;border-radius:50%;background:radial-gradient(ellipse,rgba(32,224,112,0.09) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

/* Ghost number */
.ghost{position:absolute;font-family:'Space Mono',monospace;font-size:520px;font-weight:700;color:#20E070;opacity:0.025;top:-60px;right:-40px;line-height:1;pointer-events:none;user-select:none}

/* Overlays */
.ov-top{position:absolute;top:0;left:0;right:0;height:240px;background:linear-gradient(to bottom,rgba(10,10,12,0.88) 0%,transparent 100%);z-index:10;pointer-events:none}
.ov-bot{position:absolute;bottom:0;left:0;right:0;height:380px;background:linear-gradient(to top,rgba(10,10,12,0.97) 0%,rgba(10,10,12,0.5) 60%,transparent 100%);z-index:10;pointer-events:none}

/* Brand */
.brand{position:absolute;top:44px;left:52px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#20E070;z-index:20;letter-spacing:.04em}
.brand span{color:#2A2A38;font-weight:400}

/* Counter */
.counter{position:absolute;top:44px;right:52px;font-family:'Space Mono',monospace;font-size:10px;color:#2A2A38;letter-spacing:2px;text-transform:uppercase;z-index:20}

/* Bottom */
.bottom{position:absolute;bottom:52px;left:52px;right:52px;display:flex;justify-content:space-between;align-items:flex-end;z-index:20}
.num{font-family:'Space Mono',monospace;font-size:11px;color:#20E070;letter-spacing:3px;margin-bottom:16px}
.title{font-size:88px;font-weight:800;color:#F0F0F4;line-height:.92;letter-spacing:-3px}
.tags{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.tag{font-family:'Space Mono',monospace;font-size:9px;color:#4A4A58;letter-spacing:1.5px;text-transform:uppercase;padding:7px 14px;border:1px solid rgba(255,255,255,0.05);border-radius:4px}

/* Visual */
.visual{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%) rotate(-1.5deg);z-index:5}

/* CMS Grid */
.cms-wrap{width:780px;display:flex;flex-direction:column;gap:12px}
.cms-row{display:grid;gap:12px}
.cms-row.r1{grid-template-columns:1fr}
.cms-row.r2{grid-template-columns:1fr 1fr 1fr}
.cms-card{background:#0E0E12;border:1px solid rgba(255,255,255,0.05);border-radius:10px;overflow:hidden;position:relative}
.cms-card .top-bar-ac{position:absolute;top:0;left:0;right:0;height:2px;background:#20E070}
.cms-card .top-bar-dim{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(32,224,112,0.25)}
.cms-img{background:linear-gradient(135deg,rgba(32,224,112,0.10) 0%,rgba(32,224,112,0.03) 60%,transparent 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.cms-img::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,0.012) 40px,rgba(255,255,255,0.012) 41px),repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,0.012) 40px,rgba(255,255,255,0.012) 41px)}
.cms-card.hero .cms-img{height:180px}
.cms-card:not(.hero) .cms-img{height:100px}
.cms-body{padding:14px 16px}
.cms-ttl{height:11px;background:rgba(240,240,244,0.18);border-radius:3px;margin-bottom:8px}
.cms-ln{height:7px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:5px}
.cms-ln.s{width:55%}
.cms-tag-row{display:flex;gap:6px;margin-top:10px}
.cms-chip{height:19px;width:52px;background:rgba(32,224,112,0.07);border:1px solid rgba(32,224,112,0.12);border-radius:3px}
/* hero internal layout */
.hero-inner{display:flex;align-items:center;gap:20px;padding:0 28px;width:100%}
.hero-icon{width:48px;height:48px;border-radius:10px;background:rgba(32,224,112,0.08);border:1px solid rgba(32,224,112,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hero-lines{flex:1}
.hl1{height:11px;width:45%;background:rgba(240,240,244,0.18);border-radius:3px;margin-bottom:8px}
.hl2{height:7px;width:30%;background:rgba(255,255,255,0.07);border-radius:2px}
.hero-badge{font-family:'Space Mono',monospace;font-size:9px;color:#20E070;background:rgba(32,224,112,0.07);border:1px solid rgba(32,224,112,0.14);border-radius:4px;padding:5px 10px;letter-spacing:1px;white-space:nowrap}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="ghost">01</div>
<div class="ov-top"></div>
<div class="ov-bot"></div>

<div class="brand">VM_<span>studio</span></div>
<div class="counter">Case Study · 01 / 03</div>

<!-- Visual: CMS content grid -->
<div class="visual">
  <div class="cms-wrap">
    <!-- Hero row -->
    <div class="cms-row r1">
      <div class="cms-card hero">
        <div class="top-bar-ac"></div>
        <div class="cms-img">
          <div class="hero-inner">
            <div class="hero-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(32,224,112,0.55)" stroke-width="1.5" stroke-linecap="round">
                <rect x="3" y="3" width="7" height="9" rx="1.5"/>
                <rect x="14" y="3" width="7" height="5" rx="1.5"/>
                <rect x="14" y="12" width="7" height="9" rx="1.5"/>
                <rect x="3" y="16" width="7" height="5" rx="1.5"/>
              </svg>
            </div>
            <div class="hero-lines">
              <div class="hl1"></div>
              <div class="hl2"></div>
            </div>
            <div class="hero-badge">48 ARTICLES</div>
          </div>
        </div>
        <div class="cms-body">
          <div class="cms-ttl" style="width:60%"></div>
          <div class="cms-ln"></div>
          <div class="cms-ln s"></div>
          <div class="cms-tag-row"><div class="cms-chip"></div><div class="cms-chip"></div></div>
        </div>
      </div>
    </div>
    <!-- 3-col row -->
    <div class="cms-row r2">
      <div class="cms-card">
        <div class="top-bar-dim"></div>
        <div class="cms-img"></div>
        <div class="cms-body">
          <div class="cms-ttl" style="width:70%"></div>
          <div class="cms-ln"></div>
          <div class="cms-ln s"></div>
        </div>
      </div>
      <div class="cms-card">
        <div class="top-bar-dim"></div>
        <div class="cms-img"></div>
        <div class="cms-body">
          <div class="cms-ttl" style="width:55%"></div>
          <div class="cms-ln"></div>
          <div class="cms-ln" style="width:65%"></div>
        </div>
      </div>
      <div class="cms-card">
        <div class="top-bar-dim"></div>
        <div class="cms-img"></div>
        <div class="cms-body">
          <div class="cms-ttl" style="width:80%"></div>
          <div class="cms-ln"></div>
          <div class="cms-ln s"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom -->
<div class="bottom">
  <div>
    <div class="num">// 01</div>
    <div class="title">Publishing<br>at Scale</div>
  </div>
  <div class="tags">
    <div class="tag">Webflow</div>
    <div class="tag">Editorial Design</div>
    <div class="tag">Content Strategy</div>
  </div>
</div>
</body>
</html>
